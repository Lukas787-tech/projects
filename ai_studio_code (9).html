<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukas | Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000; /* Pure Black Base */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Minimalist Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .splash-content {
            text-align: center;
        }

        @keyframes trackIn {
            0% { letter-spacing: -0.25em; opacity: 0; filter: blur(12px); transform: scale(0.95); }
            100% { letter-spacing: -0.06em; opacity: 1; filter: blur(0); transform: scale(1); }
        }

        .splash-title {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -0.06em;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 20px;
            animation: trackIn 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .enter-btn {
            display: inline-block;
            position: relative;
            padding: 10px 0;
        }

        .enter-text {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
        }

        .btn-line {
            width: 0;
            height: 1px;
            background-color: #ffffff;
            margin-top: 8px;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash-screen:hover .enter-text {
            color: #ffffff;
        }

        .splash-screen:hover .btn-line {
            width: 100%;
        }

        /* 3D Canvas Background */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Foreground Content Layer */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            pointer-events: none; 
            mix-blend-mode: difference;
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: opacity 2s cubic-bezier(0.16, 1, 0.3, 1), transform 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .content.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Ultra-Clean Modern Typography */
        h1 {
            font-size: 8rem;
            letter-spacing: -0.06em;
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 0px;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .about {
            font-size: 1.25rem;
            font-weight: 400;
            max-width: 500px;
            margin: 20px auto 40px auto;
            color: #ffffff;
            line-height: 1.6;
            letter-spacing: -0.02em;
            pointer-events: auto;
        }

        .highlight {
            font-weight: 800;
            display: block;
            margin-top: 10px;
        }

        /* Minimalist Icon Buttons */
        .links {
            display: flex;
            gap: 30px;
            pointer-events: auto;
        }

        a.icon-btn {
            color: #ffffff;
            font-size: 1.8rem;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            opacity: 0.7;
        }

        a.icon-btn:hover {
            opacity: 1;
            transform: translateY(-5px) scale(1.1);
        }

        /* Premium Custom Capsule Audio Player Widget */
        .audio-player-capsule {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 16px 8px 10px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 2s cubic-bezier(0.16, 1, 0.3, 1);
            user-select: none;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .audio-player-capsule.visible {
            opacity: 1;
        }

        .audio-player-capsule:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .play-indicator {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .audio-player-capsule:hover .play-indicator {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
        }

        .play-icon {
            font-size: 0.65rem;
            color: #ffffff;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Precision Equalizer Visualization overlay inside play button capsule */
        .eq-bars {
            display: none;
            align-items: center;
            gap: 2px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .eq-bar {
            width: 2px;
            height: 10px;
            background-color: #ffffff;
            transform: scaleY(0.3);
            transform-origin: center;
        }

        /* Toggle playing visualizer overlay states */
        .audio-player-capsule.playing .eq-bars {
            display: flex;
        }
        .audio-player-capsule.playing .play-icon {
            opacity: 0;
            transform: scale(0.5);
        }

        .audio-player-capsule.playing .eq-bar {
            animation: eqBounce 0.6s ease-in-out infinite alternate;
        }
        .audio-player-capsule.playing .eq-bar:nth-child(1) { animation-delay: 0.1s; }
        .audio-player-capsule.playing .eq-bar:nth-child(2) { animation-delay: 0.3s; }
        .audio-player-capsule.playing .eq-bar:nth-child(3) { animation-delay: 0.2s; }

        @keyframes eqBounce {
            0% { transform: scaleY(0.2); }
            100% { transform: scaleY(1.3); }
        }

        .track-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .track-title {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #ffffff;
            line-height: 1.2;
        }

        .track-artist {
            font-size: 0.6rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.03em;
            line-height: 1.2;
            margin-top: 2px;
        }

        /* Off-screen/Invisible Player Embed */
        .hidden-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            left: -9999px;
            top: -9999px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
            .about { font-size: 1.1rem; padding: 0 20px; }
            .audio-player-capsule {
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
            }
            .audio-player-capsule:hover {
                transform: translateX(50%) translateY(-3px);
            }
            .splash-title { font-size: 4rem; }
        }
    </style>

    <script src="https://w.soundcloud.com/player/api.js"></script>
</head>
<body>

    <!-- Minimalist entry portal -->

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // Helper Math Function for smooth interpolation (removes wavefront popping)
        function smoothstep(edge0, edge1, x) {
            const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
            return t * t * (3 - 2 * t);
        }

        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); 
        
        // 2. Camera Setup (Start slightly farther away for a smooth entry zoom ease)
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        let targetCamZ = 18; 
        let currentCamZ = 18;
        camera.position.set(0, 0, currentCamZ); 

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 4. Geometry: Plane for dynamic liquid movement
        const geometry = new THREE.PlaneGeometry(55, 45, 65, 65); 
        
        // 5. Liquid Material: Clean, continuous monochrome chrome/silver
        const material = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.05,
            metalness: 0.85, 
            clearcoat: 1.0,
            clearcoatRoughness: 0.05,
            flatShading: false,
            side: THREE.DoubleSide
        });
        
        const liquidPlane = new THREE.Mesh(geometry, material);
        liquidPlane.rotation.x = -0.15;
        scene.add(liquidPlane);

        // 6. Calm, Non-Flashing Lights (Start with zero intensity to fade them on entry)
        const ambientLight = new THREE.AmbientLight(0x111111, 0.0);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.0); 
        mainLight.position.set(-15, 15, 12);
        scene.add(mainLight);

        const rimLight = new THREE.DirectionalLight(0x777777, 0.0); 
        rimLight.position.set(15, -15, 5);
        scene.add(rimLight);

        // Interactive mouse light tracking (specular highlight)
        const mouseLight = new THREE.PointLight(0xffffff, 4.0, 25);
        mouseLight.position.set(0, 0, 6);
        scene.add(mouseLight);

        let targetLightIntensity = 0.0;
        let currentLightIntensity = 0.0;

        // 7. Store Original Vertices for 3D Math Deformations
        const positionAttribute = geometry.attributes.position;
        const originalPositions = [];
        for (let i = 0; i < positionAttribute.count; i++) {
            originalPositions.push(new THREE.Vector3().fromBufferAttribute(positionAttribute, i));
        }

        // 8. Dynamic Floating Particles (Monochrome Ambient Dust)
        const particleCount = 60;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            particlePositions[i] = (Math.random() - 0.5) * 40;
            particlePositions[i + 1] = (Math.random() - 0.5) * 30;
            particlePositions[i + 2] = Math.random() * 8 - 4; 
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

        // Procedural circular texture for soft silver embers
        const pCanvas = document.createElement('canvas');
        pCanvas.width = 16;
        pCanvas.height = 16;
        const pCtx = pCanvas.getContext('2d');
        const grad = pCtx.createRadialGradient(8, 8, 0, 8, 8, 8);
        grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        pCtx.fillStyle = grad;
        pCtx.fillRect(0, 0, 16, 16);

        const pTexture = new THREE.CanvasTexture(pCanvas);

        const particleMaterial = new THREE.PointsMaterial({
            color: 0xffffff, 
            size: 0.35,
            map: pTexture,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // 9. Mouse Tracking & Ripple Setup
        const targetMouse = { x: 0, y: 0 };
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const ripples = []; 
        let nextAutoRippleTime = 0; 

        window.addEventListener('mousemove', (event) => {
            targetMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Click interaction triggers manual ripples
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(liquidPlane);
            
            if (intersects.length > 0) {
                const point = intersects[0].point;
                ripples.push({
                    x: point.x,
                    y: point.y,
                    time: clock.getElapsedTime(),
                    amplitude: 2.0,
                    decay: 2.2,
                    speed: 6.0,
                    wavelength: 1.4
                });
                if (ripples.length > 8) ripples.shift();
            }
        });

        // 10. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime() * 0.35; 
            const elapsed = clock.getElapsedTime();

            // Automatic wave generation generator
            if (elapsed > nextAutoRippleTime) {
                const randomX = (Math.random() - 0.5) * 36; // Viewport safe zone X (-18 to 18)
                const randomY = (Math.random() - 0.5) * 24; // Viewport safe zone Y (-12 to 12)
                ripples.push({
                    x: randomX,
                    y: randomY,
                    time: elapsed,
                    amplitude: 1.2 + Math.random() * 1.0, 
                    decay: 2.2,
                    speed: 4.5 + Math.random() * 2.0,     
                    wavelength: 1.1 + Math.random() * 0.5
                });
                if (ripples.length > 8) ripples.shift();

                // Schedule next automatic ripple wave event (randomly between 1.2 and 3 seconds)
                nextAutoRippleTime = elapsed + 1.2 + Math.random() * 1.8;
            }

            // Rotate floating particles
            particles.rotation.y = time * 0.05;
            particles.rotation.x = time * 0.03;

            // Move pointer highlight light
            mouseLight.position.x += (targetMouse.x * 15 - mouseLight.position.x) * 0.1;
            mouseLight.position.y += (targetMouse.y * 10 - mouseLight.position.y) * 0.1;

            // Smooth camera entrance zoom transition
            currentCamZ += (targetCamZ - currentCamZ) * 0.04; 
            camera.position.z = currentCamZ;

            // Smoothly light the scene as the curtain rises
            currentLightIntensity += (targetLightIntensity - currentLightIntensity) * 0.035;
            ambientLight.intensity = 0.8 * currentLightIntensity;
            mainLight.intensity = 2.5 * currentLightIntensity;
            rimLight.intensity = 1.5 * currentLightIntensity;

            // Slow camera drift
            const camTime = clock.getElapsedTime() * 0.08;
            camera.position.x = Math.sin(camTime) * 1.5;
            camera.position.y = Math.cos(camTime) * 1.0;
            camera.lookAt(0, 0, 0);

            const activeRipples = ripples.filter(r => (elapsed - r.time) < 3.0);

            // Calculate deform matrix
            for (let i = 0; i < positionAttribute.count; i++) {
                const v = originalPositions[i];
                
                // Calm background wave matrix
                const wave1 = Math.sin(v.x * 0.1 + time * 0.8) * Math.cos(v.y * 0.12 + time * 0.6);
                const wave2 = Math.sin(v.y * 0.22 - time * 1.0) * Math.cos(v.x * 0.15 + time * 0.7);
                const wave3 = Math.sin((v.x + v.y) * 0.04 + time * 0.3) * 1.4;
                
                let zDisplacement = (wave1 * 1.8 + wave2 * 1.1 + wave3) * 0.8;
                
                // Propagate both manual and automatic ripples with smoothstep envelope
                activeRipples.forEach(r => {
                    const dx = v.x - r.x;
                    const dy = v.y - r.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const age = elapsed - r.time;
                    
                    const waveFront = age * r.speed;
                    if (dist < waveFront) {
                        // Smoothly envelope wavefront edges using a custom smoothstep function
                        const envelope = smoothstep(waveFront - 3.0, waveFront, dist);
                        const fade = Math.max(0, 1.0 - (age / 3.0)) * Math.max(0, 1.0 - (dist / 16.0)) * envelope;
                        const rippleWave = Math.sin((dist - waveFront) * r.wavelength) * r.amplitude * fade;
                        zDisplacement += rippleWave;
                    }
                });

                const xShift = Math.sin(v.y * 0.08 + time * 0.3) * 0.3;
                const yShift = Math.cos(v.x * 0.08 + time * 0.3) * 0.3;

                positionAttribute.setXYZ(i, v.x + xShift, v.y + yShift, v.z + zDisplacement);
            }
            
            geometry.computeVertexNormals();
            positionAttribute.needsUpdate = true;

            renderer.render(scene, camera);
        }
        animate();

        // 11. Responsive Canvas Setup
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        // 12. SoundCloud Widget API Integration
        let widget;

        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('soundcloud_widget');
            if (iframe) {
                widget = SC.Widget(iframe);
            }
        });

        // 13. Splash Screen Entrance Controller
        window.enterSite = function() {
            const splash = document.getElementById('splashScreen');
            splash.classList.add('hidden');
            
            // Seamlessly reveal main content structure
            document.getElementById('mainContent').classList.add('visible');
            document.getElementById('audioPlayer').classList.add('visible');
            
            // Ease 3D camera zoom closer and slowly fade up metal specular lighting
            targetCamZ = 12; 
            targetLightIntensity = 1.0;

            // Play the SoundCloud player inside the browser-authorized click handler context
            if (widget) {
                widget.play();
                document.getElementById('audioPlayer').classList.add('playing');
                document.getElementById('audioStatus').textContent = "PLAYING";
            }
        };

        // Toggle music play/pause via the controller pill manually
        window.toggleAudio = function(e) {
            if (e) e.stopPropagation(); 
            if (widget) {
                widget.isPaused((paused) => {
                    const capsule = document.getElementById('audioPlayer');
                    const statusText = document.getElementById('audioStatus');
                    if (paused) {
                        widget.play();
                        capsule.classList.add('playing');
                        statusText.textContent = "PLAYING";
                    } else {
                        widget.pause();
                        capsule.classList.remove('playing');
                        statusText.textContent = "PAUSED";
                    }
                });
            }
        }
    </script>
</body>
