<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radial Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div id="app" class="radial-container">
      <!-- Glow backing effect -->
      <div class="glow-bg"></div>
      
      <div id="menu-wrapper">
        <!-- SVG for drawing slices -->
        <svg id="radial-svg" width="600" height="600" viewBox="0 0 600 600">
          <!-- SVG filters for glowing effects -->
          <defs>
            <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="6" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <!-- Sub-slices group (rendered further out) -->
          <g id="sub-slices-group"></g>
          <!-- Indicator dots group (small dots per slice showing sub-count) -->
          <g id="dots-group"></g>
          <!-- Slices group -->
          <g id="slices-group"></g>
          <!-- Animated orbital ring around center hub -->
          <circle class="orbital-ring" cx="300" cy="300" r="72" />
          <circle class="orbital-ring orbital-ring-2" cx="300" cy="300" r="72" />
        </svg>
        
        <!-- Glass Center Hub -->
        <div id="center-hub" class="center-hub">
          <div id="hub-icon" class="hub-icon">🌀</div>
          <div id="hub-label" class="hub-label">HOLD CTRL+Q</div>
          <div id="hub-sublabel" class="hub-sublabel">Select Action</div>
        </div>

        <!-- Floating Active Media Bar -->
        <div id="media-bar" class="media-bar"></div>

        <!-- Search Bar -->
        <div id="search-bar" class="search-bar">
          <input type="text" id="search-input" placeholder="Type to search..." />
          <div id="search-results" class="search-results"></div>
        </div>
      </div>
    </div>
  </body>
</html>
